name: 更新股價快照

on:
  schedule:
    # 每週一~五 UTC 05:40 = 台灣 13:40（台股 13:30 收盤後）。cron 尖峰可能延遲數分鐘，抓收盤價無妨。
    - cron: '40 5 * * 1-5'
  workflow_dispatch:   # 手動按鈕：Actions 頁面可隨時點「Run workflow」

permissions:
  contents: write   # 需要能 commit / push reports.json
  actions: write    # 需要能觸發 pages.yml 重新部署

concurrency:
  group: update-quotes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 抓取最新報價，更新 reports.json
        run: python scripts/update_quotes.py

      - name: 有變動才 commit / push
        id: commit
        run: |
          if git diff --quiet -- docs/data/reports.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "報價無變動，略過 commit。"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/data/reports.json
            git commit -m "chore: 更新股價快照 ($(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M'))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "已推送更新。"
          fi

      - name: 觸發 Pages 重新部署
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml
